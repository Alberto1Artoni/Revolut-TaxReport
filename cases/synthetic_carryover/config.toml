# Foglio Calcoli — synthetic case exercising prior-year carried positions, opening cash,
# and a UCITS fund sold at a loss (RT-via-PMC). Hand-built, not a real taxpayer.

fiscal_year = 2025
input_dir = "input"
ref_dir = "../../data"
minus_carryforward = "0"

[broker]
code = "SYNTH-TEST"
country = "Lituania"
country_code = "259"

[[holders]]
name = "Synthetic"
share = "1.0"

[fund_overrides]

# ------------------------------------------------------------------------------------------
# Validation. Key anchors hand-verified: TESTF (carried UCITS fund sold at loss) -> RT
# minus 100, RW ETF VI 1000/VF 900/giorni 182; TESTS (carried stock still open) contributes
# 100*3 = 300 held for 365 days (VIvafe 109500) inside Azioni. Remaining values frozen from
# the engine to guard the prior-year / opening-cash code paths against regressions.
# ------------------------------------------------------------------------------------------
[test]
enabled = true
note = "synthetic regression fixture for prior-year carried positions + opening cash + fund loss"

