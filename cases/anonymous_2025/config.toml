# Foglio Calcoli — case: anonymous_2025 (synthetic anonymised case)
#
# Derived from an anonymised Revolut export with slightly altered dividend figures.
# It contains no real holder data; expected values below are the tool's own output on
# these inputs, so `python main.py --test` acts as a self-consistency regression check.

fiscal_year = 2025
input_dir = "input"
ref_dir = "../../data"         # shared rates + AdE codes
minus_carryforward = "0"

[broker]
code = "RVLT-LT-UK"
country = "Lituania"
country_code = "259"

[[holders]]
name = "MarioRossi"
share = "1.0"

[fund_overrides]

# ------------------------------------------------------------------------------------------
# Validation: regression values captured from this tool's own run on the inputs above
# (synthetic, not from an external reference). `python main.py --test` re-checks them.
# ------------------------------------------------------------------------------------------
[test]
enabled = true
source = "synthetic (self-consistency check)"
tolerance = "0.01"

